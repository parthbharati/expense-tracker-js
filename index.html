<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .card {
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn {
      border-radius: 12px;
    }
    .form-control, .form-select {
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
    }
    .form-select option {
      color: black;
      background: white;
    }
    .form-control::placeholder {
      color: #cbd5f5;
    }
    .table {
      color: white;
    }
    thead {
      background: white;
      color: black;
    }
    h5 {
      color: white;
    }
    .empty {
      text-align: center;
      opacity: 0.9;
      padding: 20px;
      color: white;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h2 class="text-center mb-4">💸 Expense Tracker</h2>

  <!-- Input Card -->
  <div class="card p-4 shadow">
    <div class="row g-3">
      <div class="col-md-2">
        <input type="number" id="amount" class="form-control" placeholder="Amount">
      </div>
      <div class="col-md-3">
        <input type="text" id="desc" class="form-control" placeholder="Description">
      </div>
      <div class="col-md-2">
        <select id="category" class="form-select">
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="col-md-3">
        <input type="date" id="date" class="form-control">
      </div>
      <div class="col-md-2 d-grid">
        <button type="button" class="btn btn-primary" onclick="addExpense()">Add</button>
      </div>
    </div>
  </div>

  <!-- Filter + Summary -->
  <div class="card p-4 mt-4 shadow">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5>Total: ₹ <span id="total">0</span></h5>
      <select id="filter" class="form-select w-auto" onchange="displayExpenses()">
        <option value="All">All</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <table class="table mt-3">
      <thead>
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Description</th>
          <th>Category</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="expenseList"></tbody>
    </table>

    <div id="emptyState" class="empty d-none">No expenses yet 🚀</div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function addExpense() {
  let amount = $("#amount").val();
  let desc = $("#desc").val();
  let category = $("#category").val();
  let date = $("#date").val();

  if (!amount || !desc || !date) {
    alert("Fill all fields bro 😑");
    return;
  }

  let expense = { amount: Number(amount), desc, category, date };
  expenses.push(expense);

  localStorage.setItem("expenses", JSON.stringify(expenses));

  $("#amount").val("");
  $("#desc").val("");

  displayExpenses();
}

function displayExpenses() {
  let list = document.getElementById("expenseList");
  let empty = document.getElementById("emptyState");
  let filter = document.getElementById("filter").value;

  list.innerHTML = "";

  let total = 0;
  let filtered = expenses.filter(e => filter === "All" || e.category === filter);

  if (filtered.length === 0) {
    empty.classList.remove("d-none");
  } else {
    empty.classList.add("d-none");
  }

  filtered.forEach((e, index) => {
    total += e.amount;

    list.innerHTML += `
      <tr>
        <td>${e.date}</td>
        <td>₹ ${e.amount}</td>
        <td>${e.desc}</td>
        <td>${e.category}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteExpense(${index})">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = total;
}

function deleteExpense(index) {
  expenses.splice(index, 1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  displayExpenses();
}

// Load on start
if (!document.getElementById("date").value) {
  document.getElementById("date").valueAsDate = new Date();
}

displayExpenses();
</script>

</body>
</html>
